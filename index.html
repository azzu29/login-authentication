<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Page</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }
      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(to right, #4a90e2, #8e44ad);
      }
      .login-box {
        width: 320px;
        background: #fff;
        padding: 40px 30px;
        border-radius: 8px;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .login-box h1 {
        margin-bottom: 40px;
        font-size: 36px;
        color: #222;
      }
      form {
        width: 100%;
        display: flex;
        flex-direction: column;
      }
      input {
        width: 100%;
        border: none;
        border-bottom: 2px solid #ccc;
        outline: none;
        padding: 12px 5px;
        margin-bottom: 25px;
        font-size: 15px;
      }
      input:focus {
        border-bottom: 2px solid #8e44ad;
      }
      button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 3px;
        background: linear-gradient(to right, #4a90e2, #8e44ad);
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
      }
      button:hover {
        opacity: 0.9;
      }
      .forgot {
        margin-top: 30px;
        text-decoration: none;
        color: #555;
        font-size: 14px;
      }
      .signup {
        margin-top: 15px;
        font-size: 14px;
        color: #666;
      }
      .signup a {
        text-decoration: none;
        color: #4a90e2;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="login-box">
      <h1>Login</h1>
      <form id="loginForm">
        <input type="email" id="email" placeholder="Email" required />
        <input type="password" id="password" placeholder="Password" required />
        <button type="submit">Login</button>
        <p id="error" style="color: red; margin-top:10px"></p>
      </form>
      <a href="#" class="forgot">Forgot Password?</a>
      <p class="signup">Don't have an account? <a href="#">Sign up</a></p>
    </div>
    <script src="login.js"></script>
  </body>
</html>
