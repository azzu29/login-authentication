<!doctype html>
<html>
  <head>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <style>
      body {
        background-color: #fafafa; /* A soft, premium purple */
        margin: 0;
        padding: 0;
      }

      ul {
        list-style-type: none;
        margin: 0;
        padding: 0;
        overflow: hidden;
        display: flex;
        justify-content: center;
        background: linear-gradient(135deg, #7e22ce, #4c1d95);
        position: sticky;
        top: 0;
        z-index: 1000;
      }

      ul li a {
        display: block;
        color: white;
        padding: 14px 16px;
        text-decoration: none;
        text-align: center;
      }
      li a:hover {
        background-color: #00f5d4;
        color: black;
      }

      .card-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        max-width: 1200px;
        margin: auto;
        padding: 20px;
      }

      .card {
        background-color: #ffffff;
        border-radius: 20px;
        overflow: hidden;
        text-align: center;
        box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2);
        transition: all 0.3s ease;
        width: 100%;
        max-width: 300px;
        margin: 0 auto;
        font-family: arial;
      }

      /* Hover for the card background. */
      .card:hover {
        box-shadow: 0 15px 30px rgba(255, 0, 127, 0.3); /* Electric pink glow */
        transform: translateY(-5px);
      }

      .card img {
        width: 100px;
        height: 250px;
        object-position: top;
        cursor: pointer;
        border-radius: 15px;
      }

      .title {
        color: #ff007f;
        font-size: 18px;
      }

      button {
        border: none;
        outline: 0;
        display: inline-block;
        padding: 8px;
        color: white;
        background-color: #ff007f;
        text-align: center;
        cursor: pointer;
        width: 100%;
        font-size: 18px;
      }

      a {
        text-decoration: none;
        font-size: 22px;
        color: black;
      }

      button:hover,
      a:hover {
        background-color: #00f5d4;
        color: black;
      }

      button,
      a,
      li a {
        transition: all 0.3s ease; /* It makes the transition smooth */
      }

      footer {
        text-align: center;
      }
    </style>
  </head>
